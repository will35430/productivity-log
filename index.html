<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30-Minute Productivity Log</title>
  <style>
    :root {
      --bg: #f3f6ff;
      --bg2: #eef9ff;
      --panel: #ffffff;
      --text: #1f2a44;
      --muted: #62708f;
      --border: #dce6ff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --accent: #06b6d4;
      --accent-hover: #0891b2;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --radius: 14px;
      --shadow: 0 10px 26px rgba(31, 42, 68, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg), var(--bg2));
      display: flex;
      justify-content: center;
      padding: 22px 14px;
    }

    .app {
      width: 100%;
      max-width: 880px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h1 {
      margin: 0;
      text-align: center;
      letter-spacing: -0.02em;
      font-size: clamp(1.4rem, 3.1vw, 2rem);
      color: #1c2d7d;
    }

    .subtitle {
      margin: 8px 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2a3962;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font: inherit;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    textarea:focus {
      border-color: #a5b4fc;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.18);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-add { background: var(--primary); color: #fff; }
    .btn-add:hover { background: var(--primary-hover); }

    .btn-clear { background: var(--danger); color: #fff; }
    .btn-clear:hover { background: var(--danger-hover); }

    .entry-list { display: grid; gap: 10px; }

    .entry {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 4px 12px rgba(31, 42, 68, 0.08);
    }

    .entry-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .time {
      display: grid;
      gap: 2px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .time strong {
      color: #23315a;
      font-size: 0.9rem;
    }

    .entry p {
      margin: 0;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .entry-actions {
      display: flex;
      gap: 7px;
    }

    .btn-edit, .btn-save {
      background: var(--accent);
      color: #fff;
      padding: 7px 10px;
      font-size: 0.85rem;
    }
    .btn-edit:hover, .btn-save:hover { background: var(--accent-hover); }

    .btn-cancel {
      background: #eef2ff;
      color: #364069;
      border: 1px solid #d7defc;
      padding: 7px 10px;
      font-size: 0.85rem;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #f8fbff;
    }

    .edit-input {
      min-height: 90px;
      margin-top: 6px;
    }

    @media (max-width: 620px) {
      .panel { padding: 15px; }
      textarea { min-height: 135px; }
      .actions button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>30-Minute Productivity Log</h1>
      <p class="subtitle">Simple, coloré et ergonomique pour suivre chaque bloc de 30 min.</p>
      <label for="entryText">Qu'est-ce que tu viens de faire pendant les 30 dernières minutes ?</label>
      <textarea id="entryText" placeholder="Ex: correction d'un bug, réunion standup, documentation, revue de code..."></textarea>
      <div class="actions">
        <button id="addEntry" class="btn-add" type="button">Add Entry</button>
        <button id="clearEntries" class="btn-clear" type="button">Clear All Entries</button>
      </div>
    </section>

    <section class="panel">
      <div id="entryList" class="entry-list"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEYS = ['productivity-log-entries-v2', 'productivity-log-entries-v1'];
    const STORAGE_KEY = STORAGE_KEYS[0];

    const entryTextEl = document.getElementById('entryText');
    const addEntryBtn = document.getElementById('addEntry');
    const clearEntriesBtn = document.getElementById('clearEntries');
    const entryListEl = document.getElementById('entryList');

    let editingId = null;

    function makeId() {
      return `entry-${Date.now()}-${Math.floor(Math.random() * 1000000)}`;
    }

    function normalizeEntry(entry) {
      const end = Number(entry.endTimestamp || entry.timestamp || Date.now());
      return {
        id: entry.id || makeId(),
        text: typeof entry.text === 'string' ? entry.text : '',
        endTimestamp: end,
        startTimestamp: Number(entry.startTimestamp || (end - 30 * 60 * 1000))
      };
    }

    function loadEntries() {
      for (const key of STORAGE_KEYS) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!Array.isArray(parsed)) continue;
          const normalized = parsed.map(normalizeEntry);
          return normalized;
        } catch {
          // ignore and continue fallback keys
        }
      }
      return [];
    }

    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDateTime(ts) {
      return new Date(ts).toLocaleString([], {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderEntries(entries) {
      entryListEl.innerHTML = '';

      if (!entries.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Aucune entrée pour le moment.';
        entryListEl.appendChild(empty);
        return;
      }

      entries.forEach((entry) => {
        const card = document.createElement('article');
        card.className = 'entry';

        const head = document.createElement('div');
        head.className = 'entry-head';

        const time = document.createElement('div');
        time.className = 'time';
        const end = document.createElement('strong');
        end.textContent = `Fin : ${formatDateTime(entry.endTimestamp)}`;
        const start = document.createElement('span');
        start.textContent = `Début : ${formatDateTime(entry.startTimestamp)}`;
        time.append(end, start);

        const actions = document.createElement('div');
        actions.className = 'entry-actions';

        if (editingId === entry.id) {
          const saveBtn = document.createElement('button');
          saveBtn.className = 'btn-save';
          saveBtn.type = 'button';
          saveBtn.textContent = 'Enregistrer';
          saveBtn.addEventListener('click', () => saveEdit(entry.id));

          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'btn-cancel';
          cancelBtn.type = 'button';
          cancelBtn.textContent = 'Annuler';
          cancelBtn.addEventListener('click', cancelEdit);

          actions.append(saveBtn, cancelBtn);
        } else {
          const editBtn = document.createElement('button');
          editBtn.className = 'btn-edit';
          editBtn.type = 'button';
          editBtn.textContent = 'Modifier';
          editBtn.addEventListener('click', () => startEdit(entry.id));
          actions.appendChild(editBtn);
        }

        head.append(time, actions);
        card.appendChild(head);

        if (editingId === entry.id) {
          const editInput = document.createElement('textarea');
          editInput.className = 'edit-input';
          editInput.id = `edit-${entry.id}`;
          editInput.value = entry.text;
          card.appendChild(editInput);
        } else {
          const text = document.createElement('p');
          text.textContent = entry.text;
          card.appendChild(text);
        }

        entryListEl.appendChild(card);
      });
    }

    function addEntry() {
      const text = entryTextEl.value.trim();
      if (!text) return;

      const end = Date.now();
      const entry = {
        id: makeId(),
        text,
        endTimestamp: end,
        startTimestamp: end - 30 * 60 * 1000
      };

      const entries = loadEntries();
      entries.unshift(entry);
      saveEntries(entries);
      renderEntries(entries);

      entryTextEl.value = '';
      entryTextEl.focus();
    }

    function startEdit(id) {
      editingId = id;
      renderEntries(loadEntries());
    }

    function saveEdit(id) {
      const input = document.getElementById(`edit-${id}`);
      if (!input) return;
      const nextText = input.value.trim();
      if (!nextText) return;

      const entries = loadEntries().map((entry) => {
        if (entry.id !== id) return entry;
        return { ...entry, text: nextText };
      });

      editingId = null;
      saveEntries(entries);
      renderEntries(entries);
    }

    function cancelEdit() {
      editingId = null;
      renderEntries(loadEntries());
    }

    function clearEntries() {
      localStorage.removeItem(STORAGE_KEY);
      editingId = null;
      renderEntries([]);
      entryTextEl.focus();
    }

    addEntryBtn.addEventListener('click', addEntry);
    clearEntriesBtn.addEventListener('click', clearEntries);

    entryTextEl.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') addEntry();
    });

    const initialEntries = loadEntries();
    saveEntries(initialEntries);
    renderEntries(initialEntries);
  </script>
</body>
</html>
