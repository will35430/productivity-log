<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30-Minute Productivity Log</title>
  <style>
    :root {
      --bg-1: #f7f9ff;
      --bg-2: #eef4ff;
      --surface: #ffffff;
      --text: #172036;
      --muted: #5f6b85;
      --border: #dbe5ff;
      --primary: #4361ee;
      --primary-hover: #3149bf;
      --secondary: #06b6d4;
      --secondary-hover: #0891b2;
      --danger: #ef476f;
      --danger-hover: #cf3a5e;
      --shadow-soft: 0 12px 30px rgba(67, 97, 238, 0.12);
      --shadow-card: 0 6px 16px rgba(23, 32, 54, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(160deg, var(--bg-1), var(--bg-2));
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    .app {
      width: 100%;
      max-width: 860px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 3vw, 2rem);
      letter-spacing: -0.02em;
      text-align: center;
      color: #1b2b5e;
    }

    .subtitle {
      margin: 0 0 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      color: #2f3b59;
      font-weight: 600;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: #9db2ff;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.16);
    }

    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.06s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .add-btn {
      background: var(--primary);
      color: #fff;
    }

    .add-btn:hover {
      background: var(--primary-hover);
    }

    .clear-btn {
      background: var(--danger);
      color: #fff;
    }

    .clear-btn:hover {
      background: var(--danger-hover);
    }

    .entry-list {
      display: grid;
      gap: 12px;
    }

    .entry {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      box-shadow: var(--shadow-card);
    }

    .entry-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .entry-time {
      display: grid;
      gap: 2px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .entry-time strong {
      color: #2d3a62;
      font-size: 0.9rem;
    }

    .entry p {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.45;
      color: #202a44;
    }

    .entry-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-btn,
    .save-btn,
    .cancel-btn {
      padding: 7px 12px;
      font-size: 0.86rem;
      border-radius: 8px;
    }

    .edit-btn,
    .save-btn {
      background: var(--secondary);
      color: #fff;
    }

    .edit-btn:hover,
    .save-btn:hover {
      background: var(--secondary-hover);
    }

    .cancel-btn {
      background: #eef2ff;
      color: #2d3a62;
      border: 1px solid #d4ddff;
    }

    .cancel-btn:hover {
      background: #e1e8ff;
    }

    .edit-area {
      min-height: 110px;
      margin-top: 8px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #f8faff;
    }

    @media (max-width: 640px) {
      .panel {
        padding: 16px;
      }

      textarea {
        min-height: 140px;
      }

      .actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>30-Minute Productivity Log</h1>
      <p class="subtitle">Journal de travail clair, rapide et ergonomique.</p>
      <label class="input-label" for="entryText">Qu'as-tu fait durant les 30 dernières minutes ?</label>
      <textarea id="entryText" placeholder="Ex : J'ai terminé une review, corrigé un bug UI, envoyé un compte-rendu."></textarea>
      <div class="actions">
        <button class="add-btn" id="addEntry">Add Entry</button>
        <button class="clear-btn" id="clearEntries">Clear All Entries</button>
      </div>
    </section>

    <section class="panel">
      <div id="entryList" class="entry-list"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'productivity-log-entries-v2';

    const entryTextEl = document.getElementById('entryText');
    const addEntryBtn = document.getElementById('addEntry');
    const clearEntriesBtn = document.getElementById('clearEntries');
    const entryListEl = document.getElementById('entryList');

    let editingEntryId = null;

    function normalizeEntries(entries) {
      return entries.map((entry) => {
        if (entry.startTimestamp && entry.endTimestamp) {
          return entry;
        }

        const endTimestamp = entry.timestamp || Date.now();
        return {
          id: entry.id || crypto.randomUUID(),
          text: entry.text || '',
          endTimestamp,
          startTimestamp: endTimestamp - (30 * 60 * 1000)
        };
      });
    }

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return normalizeEntries(Array.isArray(parsed) ? parsed : []);
      } catch {
        return [];
      }
    }

    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDateTime(timestamp) {
      return new Date(timestamp).toLocaleString([], {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function renderEntries(entries) {
      entryListEl.innerHTML = '';

      if (!entries.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'Aucune entrée pour le moment. Ajoute ton premier bloc de 30 minutes.';
        entryListEl.appendChild(empty);
        return;
      }

      entries.forEach((entry) => {
        const item = document.createElement('article');
        item.className = 'entry';

        const header = document.createElement('div');
        header.className = 'entry-head';

        const timeInfo = document.createElement('div');
        timeInfo.className = 'entry-time';

        const end = document.createElement('strong');
        end.textContent = `Fin : ${formatDateTime(entry.endTimestamp)}`;

        const start = document.createElement('span');
        start.textContent = `Début : ${formatDateTime(entry.startTimestamp)}`;

        timeInfo.append(end, start);

        const actions = document.createElement('div');
        actions.className = 'entry-actions';

        if (editingEntryId === entry.id) {
          const saveBtn = document.createElement('button');
          saveBtn.className = 'save-btn';
          saveBtn.textContent = 'Enregistrer';
          saveBtn.type = 'button';
          saveBtn.addEventListener('click', () => saveEdit(entry.id));

          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'cancel-btn';
          cancelBtn.textContent = 'Annuler';
          cancelBtn.type = 'button';
          cancelBtn.addEventListener('click', cancelEdit);

          actions.append(saveBtn, cancelBtn);
        } else {
          const editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.textContent = 'Modifier';
          editBtn.type = 'button';
          editBtn.addEventListener('click', () => startEdit(entry.id));
          actions.appendChild(editBtn);
        }

        header.append(timeInfo, actions);

        if (editingEntryId === entry.id) {
          const editArea = document.createElement('textarea');
          editArea.className = 'edit-area';
          editArea.id = `edit-${entry.id}`;
          editArea.value = entry.text;
          item.append(header, editArea);
        } else {
          const text = document.createElement('p');
          text.textContent = entry.text;
          item.append(header, text);
        }

        entryListEl.appendChild(item);
      });
    }

    function addEntry() {
      const text = entryTextEl.value.trim();
      if (!text) return;

      const endTimestamp = Date.now();
      const startTimestamp = endTimestamp - (30 * 60 * 1000);

      const entries = loadEntries();
      entries.unshift({
        id: crypto.randomUUID(),
        startTimestamp,
        endTimestamp,
        text
      });

      saveEntries(entries);
      renderEntries(entries);
      entryTextEl.value = '';
      entryTextEl.focus();
    }

    function startEdit(id) {
      editingEntryId = id;
      renderEntries(loadEntries());
    }

    function saveEdit(id) {
      const editEl = document.getElementById(`edit-${id}`);
      if (!editEl) return;

      const newText = editEl.value.trim();
      if (!newText) return;

      const entries = loadEntries().map((entry) => (
        entry.id === id
          ? { ...entry, text: newText }
          : entry
      ));

      saveEntries(entries);
      editingEntryId = null;
      renderEntries(entries);
    }

    function cancelEdit() {
      editingEntryId = null;
      renderEntries(loadEntries());
    }

    function clearEntries() {
      localStorage.removeItem(STORAGE_KEY);
      editingEntryId = null;
      renderEntries([]);
      entryTextEl.focus();
    }

    addEntryBtn.addEventListener('click', addEntry);
    clearEntriesBtn.addEventListener('click', clearEntries);

    entryTextEl.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        addEntry();
      }
    });

    const initialEntries = loadEntries();
    saveEntries(initialEntries);
    renderEntries(initialEntries);
  </script>
</body>
</html>
